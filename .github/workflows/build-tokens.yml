name: Build Design Tokens

on:
  push:
    paths:
      - 'design-tokens/tokens.json'
      - 'design-tokens/build.js'
      - 'design-tokens/package.json'
    branches: [main]
  pull_request:
    paths:
      - 'design-tokens/tokens.json'
      - 'design-tokens/build.js'
      - 'design-tokens/package.json'
  workflow_dispatch:

jobs:
  build-tokens:
    name: Validate & Build Tokens
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-tokens

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: design-tokens/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Validate tokens.json
        run: npm run validate

      - name: Build all platforms
        run: npm run build

      - name: Verify outputs exist
        run: |
          echo "Checking build outputs..."
          test -f dist/css/tokens.css       && echo "  CSS:      OK"
          test -f dist/scss/_tokens.scss     && echo "  SCSS:     OK"
          test -f dist/js/tokens.js          && echo "  JS CJS:   OK"
          test -f dist/js/tokens.esm.js      && echo "  JS ESM:   OK"
          test -f dist/json/tokens.json      && echo "  JSON:     OK"
          test -f dist/tailwind/tokens.js    && echo "  Tailwind: OK"
          echo "All outputs verified."

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: design-tokens-dist
          path: design-tokens/dist/
          retention-days: 30
